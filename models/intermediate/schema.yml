version: 2

models:
  - name: int_supply_costs_per_sku
    description: >
      Aggregates stg_supplies to one row per SKU, splitting total supply cost into
      perishable vs. non-perishable dollars. Exists to prevent fan-out/duplicated
      revenue when supply costs are later joined onto products or order items.
    columns:
      - name: sku
        description: Primary key. Product SKU.
        tests:
          - unique
          - not_null
      - name: total_supply_cost
        description: Sum of cost across all supplies linked to this SKU.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
